<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon MVP | Template</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .cta-button {
            background: var(--accent-primary);
            color: #0f172a;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .cta-button:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Project Name</h1>
        <p>Short description of your winning AI-native solution. Ready to build tomorrow!</p>
        <button class="cta-button" onclick="testConnection()">Test API Connection</button>
        <div id="status" style="margin-top: 1.5rem; color: var(--accent-secondary); font-family: monospace;"></div>
    </div>

    <script>
        async function testConnection() {
            const status = document.getElementById('status');
            status.innerText = 'Connecting...';
            try {
                const res = await fetch('http://localhost:8000/api/health');
                const data = await res.json();
                status.innerText = '✅ API Connected: ' + data.message;
            } catch (err) {
                status.innerText = '❌ Error: Is backend running?';
            }
        }
    </script>
</body>
</html>
