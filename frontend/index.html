<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowLearn | AI Personal Mentor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <!-- ── SETUP SCREEN ─────────────────────────────────────────────────── -->
        <section id="setup-screen" class="screen active">
            <header>
                <h1>FlowLearn</h1>
                <p class="subtitle">Master any topic using the Feynman Technique and AI.</p>
            </header>

            <div class="glass-card fade-in">
                <div class="form-group">
                    <label>What do you want to master today?</label>
                    <input type="text" id="topic-input" placeholder="e.g. Quantum Entanglement, Stoicism, Photosynthesis...">
                </div>
                
                <div class="form-group">
                    <label>Your current level</label>
                    <select id="difficulty-select">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="startSession()">
                    Start Learning Path
                </button>
            </div>
        </section>

        <!-- ── LOADING SCREEN ───────────────────────────────────────────────── -->
        <section id="loading-screen" class="screen hidden">
            <div class="score-container" style="margin-top: 100px;">
                <span class="loader"></span>
                <p id="loading-text" class="subtitle" style="margin-top: 20px;">Architecting your path...</p>
            </div>
        </section>

        <!-- ── LEARN SCREEN ─────────────────────────────────────────────────── -->
        <section id="learn-screen" class="screen hidden">
            <div class="glass-card fade-in">
                <h2 class="topic-name">Topic</h2>
                <p id="overview-text" class="subtitle"></p>
                
                <div id="concepts-grid" class="grid-cards">
                    <!-- Concepts rendered here as cards -->
                </div>
            </div>

            <div id="resources-section" class="glass-card fade-in">
                <h2>Recommended Resources</h2>
                <div id="links-list">
                    <!-- Links rendered here -->
                </div>
            </div>

            <div class="glass-card fade-in">
                <h2>The Feynman Challenge</h2>
                <p id="feynman-prompt" style="margin-bottom: 1.5rem; font-style: italic; color: var(--text-dim);"></p>
                
                <div class="form-group">
                    <label>Your Explanation</label>
                    <textarea id="explanation-input" rows="6" placeholder="Explain it like you're teaching a 10-year old..."></textarea>
                </div>

                <button class="btn btn-primary" onclick="submitExplanation()">
                    Evaluate My Mastery
                </button>
            </div>
        </section>

        <!-- ── FEEDBACK SCREEN ──────────────────────────────────────────────── -->
        <section id="feedback-screen" class="screen hidden">
            <div class="glass-card fade-in">
                <div class="score-container">
                    <div class="score-circle">
                        <span id="mastery-value">0%</span>
                    </div>
                    <p class="subtitle">Mastery Score</p>
                </div>

                <h2>Mentor Feedback</h2>
                <div id="lesson-body" class="lesson-content">
                    <!-- Lesson rendered here -->
                </div>

                <div style="margin-top: 2rem;">
                    <h3>Next Step</h3>
                    <p id="next-step-text" class="subtitle"></p>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button class="btn" style="background: var(--glass); color: white; flex: 1;" onclick="resetApp()">
                        New Topic
                    </button>
                    <button class="btn btn-primary" style="flex: 1;" onclick="switchScreen('learn')">
                        Try Again
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
