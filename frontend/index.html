<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowLearn | AI Personal Mentor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- ── GAMIFICATION HEADER ──────────────────────────────────────────── -->
        <div id="gamification-bar" class="glass-card fade-in" style="display: flex; justify-content: space-between; padding: 1rem 2rem; margin-bottom: 2rem; align-items: center; background: rgba(99, 102, 241, 0.15); border-color: var(--primary);">
            <div style="font-size: 1.1rem;">
                <i class="fas fa-star" style="color: #fbbf24; margin-right: 0.5rem;"></i> 
                Level <span id="user-level" style="font-weight: 800;">1</span>: 
                <span id="user-title" style="color: #f472b6; font-weight: 600;">Curious Novice</span>
            </div>
            <div style="font-size: 0.9rem; color: var(--text-dim);">
                XP: <span id="user-xp" style="color: white; font-weight: bold;">0</span> / <span id="next-level-xp">1000</span>
            </div>
        </div>

        <!-- ── SETUP SCREEN ─────────────────────────────────────────────────── -->
        <section id="setup-screen" class="screen active">
            <header>
                <h1>FlowLearn</h1>
                <p class="subtitle">Master any topic using the Feynman Technique and AI.</p>
            </header>

            <div class="glass-card fade-in">
                <div class="form-group">
                    <label for="topic-input">What do you want to learn?</label>
                    <input type="text" id="topic-input" aria-label="Enter the topic you want to learn" placeholder="e.g., Quantum Physics, Photosynthesis, Machine Learning...">
                </div>
                
                <div class="form-group">
                    <label>Your current level</label>
                    <select id="difficulty-select" aria-label="Select your current proficiency level">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>

                <button id="start-btn" class="btn btn-primary" aria-label="Start Learning Path" onclick="startSession()">
                    Start Learning Path
                </button>
            </div>
        </section>

        <!-- ── LOADING SCREEN ───────────────────────────────────────────────── -->
        <section id="loading-screen" class="screen hidden">
            <div class="score-container" style="margin-top: 100px;">
                <span class="loader"></span>
                <p id="loading-text" class="subtitle" style="margin-top: 20px;">Architecting your path...</p>
            </div>
        </section>

        <!-- ── LEARN SCREEN ─────────────────────────────────────────────────── -->
        <section id="learn-screen" class="screen hidden">
            <div class="glass-card fade-in">
                <h2 class="topic-name">Topic</h2>
                <p id="overview-text" class="subtitle"></p>
                
                <div id="concepts-grid" class="grid-cards">
                    <!-- Concepts rendered here as cards -->
                </div>
            </div>

            <div id="resources-section" class="glass-card fade-in">
                <h2>Recommended Resources</h2>
                <div id="links-list">
                    <!-- Links rendered here -->
                </div>
            </div>

            <div class="glass-card fade-in">
                <h2>The Feynman Challenge</h2>
                <p id="feynman-prompt" style="margin-bottom: 1.5rem; font-style: italic; color: var(--text-dim);"></p>
                
                <div class="form-group">
                    <label for="explanation-input">Your Explanation</label>
                    <textarea id="explanation-input" aria-label="Type your explanation here" rows="6" placeholder="Explain the concept simply..."></textarea>
                </div>

                <button id="submit-btn" class="btn btn-primary" aria-label="Submit for Feedback" onclick="submitExplanation()">
                    Submit for Feedback
                </button>
            </div>
        </section>

        <!-- ── FEEDBACK SCREEN ──────────────────────────────────────────────── -->
        <section id="feedback-screen" class="screen hidden">
            <div class="glass-card fade-in">
                <div class="score-container">
                    <div class="score-circle">
                        <span id="mastery-value">0%</span>
                    </div>
                    <p class="subtitle">Mastery Score</p>
                </div>

                <h2>Mentor Feedback</h2>
                <button id="read-aloud-btn" class="btn" style="background: var(--glass); color: white; padding: 0.5rem 1rem; margin-bottom: 1rem; border: 1px solid var(--primary);" onclick="readAloud()">
                    <i class="fas fa-volume-up"></i> Listen to Mentor
                </button>
                <div id="lesson-body" class="lesson-content">
                    <!-- Lesson rendered here -->
                </div>

                <div style="margin-top: 2rem;">
                    <h3>Next Step</h3>
                    <p id="next-step-text" class="subtitle"></p>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button class="btn" style="background: var(--glass); color: white; flex: 1;" onclick="resetApp()">
                        New Topic
                    </button>
                    <button class="btn btn-primary" style="flex: 1;" onclick="switchScreen('learn')">
                        Try Again
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
