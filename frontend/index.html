<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowLearn | Personalized Learning Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app-container">
        <!-- SCREEN 1: Topic Selection -->
        <section id="screen-setup" class="screen active">
            <div class="glass-card main-card">
                <header>
                    <h1 class="gradient-text">FlowLearn</h1>
                    <p class="subtitle">Master any concept by explaining it in your own words.</p>
                </header>
                
                <form id="setup-form" aria-label="Start Learning Session">
                    <div class="input-group">
                        <label for="topic-input">What do you want to learn?</label>
                        <input type="text" id="topic-input" placeholder="e.g. Quantum Computing, Photosynthesis..." required aria-required="true">
                    </div>
                    
                    <div class="input-group">
                        <label for="difficulty-select">Your Current Level</label>
                        <select id="difficulty-select" aria-label="Difficulty Level">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="start-btn" class="btn-primary">
                        <span class="btn-text">Start Learning</span>
                        <span class="loader hidden" aria-hidden="true"></span>
                    </button>
                </form>
            </div>
        </section>

        <!-- SCREEN 2: Learning & Analysis -->
        <section id="screen-learn" class="screen hidden">
            <header class="top-bar">
                <h2 id="active-topic" class="gradient-text">Topic</h2>
                <button id="reset-btn" class="btn-text">← New Topic</button>
            </header>

            <div class="dashboard-grid">
                <!-- Left Column: Context -->
                <div class="glass-card context-panel">
                    <h3>Overview</h3>
                    <p id="topic-overview" aria-live="polite">Loading...</p>
                    
                    <h3 class="mt-4">Key Concepts</h3>
                    <ul id="key-concepts-list" aria-label="Key Concepts"></ul>

                    <div id="resources-section" class="mt-4 hidden">
                        <h3>Recommended Resources</h3>
                        <ul id="links-list" class="links-list"></ul>
                    </div>
                </div>

                <!-- Right Column: Workspace -->
                <div class="workspace-panel">
                    <div class="glass-card">
                        <h3 id="suggested-prompt">Explain it...</h3>
                        <textarea id="explanation-input" rows="8" placeholder="Type your explanation here. Don't worry about being perfect..." aria-label="Your explanation"></textarea>
                        <button id="analyze-btn" class="btn-primary mt-4">
                            <span class="btn-text">Analyze Explanation</span>
                            <span class="loader hidden" aria-hidden="true"></span>
                        </button>
                    </div>

                    <!-- Feedback Area (Initially hidden) -->
                    <div id="feedback-panel" class="glass-card feedback-panel hidden" aria-live="assertive">
                        <div class="score-header">
                            <h3>Mastery Score</h3>
                            <div class="score-circle">
                                <span id="score-value">0</span>%
                            </div>
                        </div>
                        
                        <p id="feedback-encouragement" class="encouragement-text"></p>
                        
                        <div class="feedback-grid">
                            <div class="feedback-box success">
                                <h4>✅ Got it Right</h4>
                                <ul id="feedback-correct"></ul>
                            </div>
                            <div class="feedback-box warning">
                                <h4>⚠️ Missing Points</h4>
                                <ul id="feedback-missing"></ul>
                            </div>
                        </div>

                        <div class="micro-lesson">
                            <h4>📚 Micro-Lesson</h4>
                            <p id="feedback-lesson"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
